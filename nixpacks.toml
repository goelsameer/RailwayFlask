[phases.setup]
nixPkgs = ["python310", "gcc"]

[phases.install]
# Create venv, activate it, and install everything inside it
cmds = [
    "python3 -m venv .venv",
    ".venv/bin/pip install --upgrade pip",
    ".venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = [".venv/bin/python -m spacy download en_core_web_sm"]

[start]
cmd = ".venv/bin/gunicorn -w 1 --timeout 120 -b 0.0.0.0:$PORT Ai-mlPython:app"